global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"
alerting:
  alertmanagers:
    - api_version: v2
      scheme: http
      path_prefix: /
      static_configs:
        - targets:
            - 'alertmanager:9093'
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'tiny-service'
    static_configs:
      - targets: ['tiny-service:5000']
    metrics_path: '/metrics'
